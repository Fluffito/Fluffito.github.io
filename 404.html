<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Redirecting…</title>
  <link id="siteFavicon" rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%230b1020'/%3E%3Cpath d='M32 10 52 18 44 52 20 52 12 18Z' fill='%237c3aed'/%3E%3Cpath d='M32 18 40 39h-5.8l-2-5.2h-8.4L21.8 39H16L24 18Zm-4.1 11.4-2.2 5.6h4.7z' fill='white'/%3E%3C/svg%3E" />
  <script>
    (function () {
      var pathParts = window.location.pathname.split("/").filter(Boolean);
      var isGitHubPages = /\.github\.io$/i.test(window.location.hostname);
      var basePath = isGitHubPages && pathParts.length ? "/" + pathParts[0] + "/" : "/";
      var siteBase = new URL(basePath, window.location.origin);
      var target = new URL("docs/index.html", siteBase);
      var homeLink = document.getElementById("homeLink");

      if (homeLink) {
        homeLink.href = target.toString();
      }

      target.search = window.location.search;
      target.hash = window.location.hash;
      window.location.replace(target.toString());
    })();
  </script>
</head>
<body>
  <p>This page moved. <a id="homeLink" href="./docs/index.html">Open APHELION</a></p>
</body>
</html>
